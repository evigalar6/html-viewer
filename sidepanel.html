<!-- sidepanel.html: Side panel UI that displays page HTML as plain text. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Keep the panel readable across side panel widths. -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Viewer</title>

    <style>
      /* Simple, clean styling focused on readability. */
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 12px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      input {
        width: 100%;
        padding: 8px 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 12px;
        max-height: 70vh;
        overflow: auto;
        background: #fafafa;
      }

      .hint {
        font-size: 12px;
        opacity: 0.75;
        margin-top: 8px;
      }
    </style>
  </head>

  <body>
    <!-- Controls: capture HTML, open standalone tab, copy, and download. -->
    <div class="row">
      <button id="grab" type="button">Capture HTML</button>
      <button id="openTab" type="button">Open in Tab</button>
      <button id="copy" type="button">Copy</button>
      <button id="download" type="button">Download</button>
    </div>

    <!-- Search in the captured HTML snapshot for quick navigation. -->
    <input id="q" type="text" placeholder="Search HTML (text)" autocomplete="off" />

    <!-- Render HTML as text so markup is never executed in the panel. -->
    <pre id="out">(click "Capture HTML")</pre>

    <div class="hint">
      Tip: capture HTML first, then search, copy, or download.
    </div>

    <!-- Viewer logic supports side panel and standalone tab modes. -->
    <script src="sidepanel.js"></script>
  </body>
</html>
