<!-- viewer.html: Standalone tab UI for the same HTML viewer workflow. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Viewer Tab</title>

    <style>
      :root {
        --bg: #f2f6fb;
        --surface: #ffffff;
        --surface-soft: #f8fbff;
        --text: #1b2733;
        --muted: #56718a;
        --border: #d0dfed;
        --primary: #0f6ab8;
        --primary-hover: #0b5a9d;
        --mark-bg: #ffd66b;
        --mark-text: #3b2a00;
        --success: #147a52;
        --error: #b73d3d;
      }

      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 14px;
        color: var(--text);
        background:
          radial-gradient(circle at 100% 0%, #d9ebff 0%, transparent 45%),
          radial-gradient(circle at 0% 100%, #dff6ed 0%, transparent 38%),
          var(--bg);
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .tools {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      button {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 1px 3px rgba(25, 47, 66, 0.08);
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      }

      button:hover {
        border-color: #b7cee3;
        box-shadow: 0 4px 10px rgba(25, 47, 66, 0.12);
      }

      button:active {
        transform: translateY(1px);
      }

      #grab {
        background: linear-gradient(180deg, #1f80d1, var(--primary));
        border-color: var(--primary);
        color: #fff;
      }

      #grab:hover {
        background: linear-gradient(180deg, #2578bf, var(--primary-hover));
        border-color: var(--primary-hover);
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .status.success {
        color: var(--success);
      }

      .status.error {
        color: var(--error);
      }

      input {
        flex: 1;
        min-width: 220px;
        box-sizing: border-box;
        padding: 10px 12px;
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        tab-size: 2;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        max-height: min(72vh, 900px);
        overflow: scroll;
        scrollbar-gutter: stable both-edges;
        background: var(--surface-soft);
        font-size: 14px;
        line-height: 1.55;
      }

      pre.no-wrap {
        white-space: pre;
        word-break: normal;
        overflow-wrap: normal;
      }

      mark {
        background: var(--mark-bg);
        color: var(--mark-text);
        border-radius: 4px;
        padding: 0 2px;
      }

      mark.current {
        background: #ff9f1a;
        color: #2f1e00;
      }

      .match-info {
        font-size: 13px;
        color: var(--muted);
        min-width: 92px;
      }

      .check {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }

      .check.push-right {
        margin-left: auto;
      }

      .check input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .switch {
        width: 42px;
        height: 24px;
        border-radius: 999px;
        background: #b4c8dc;
        border: 1px solid #8aa9c5;
        box-shadow: inset 0 1px 2px rgba(18, 52, 83, 0.2);
        position: relative;
        transition: background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 3px rgba(18, 52, 83, 0.28);
        transition: transform 180ms cubic-bezier(0.24, 0.68, 0.29, 1.26);
      }

      .check input:checked + .switch {
        background: linear-gradient(180deg, #2f9df7, #0f6ab8);
        border-color: #0f6ab8;
      }

      .check input:checked + .switch::after {
        transform: translateX(18px);
      }

      .check input:focus-visible + .switch {
        outline: 2px solid #0f6ab8;
        outline-offset: 2px;
      }

      .check-label {
        color: #425f7a;
        font-weight: 600;
      }

      #out::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      #out::-webkit-scrollbar-track {
        background: #d7e4f1;
        border-radius: 10px;
      }

      #out::-webkit-scrollbar-thumb {
        background: #7d9dbb;
        border-radius: 10px;
      }

      #out::-webkit-scrollbar-thumb:hover {
        background: #6487a8;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <button id="grab" type="button">Capture HTML</button>
      <button id="openTab" type="button">Open in Tab</button>
      <button id="copy" type="button">Copy</button>
      <button id="download" type="button">Download</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div class="tools">
      <input id="q" type="text" placeholder="Search HTML (text)" autocomplete="off" />
      <button id="prevMatch" type="button">Prev</button>
      <button id="nextMatch" type="button">Next</button>
      <span id="matchInfo" class="match-info">0 matches</span>
      <label class="check push-right" for="prettyView">
        <input id="prettyView" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
        <span class="check-label">Pretty view</span>
      </label>
      <label class="check" for="wrapLines">
        <input id="wrapLines" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
        <span class="check-label">Wrap lines</span>
      </label>
    </div>
    <pre id="out">(click "Capture HTML")</pre>
    <div class="hint">
      Tip: this tab captures from the source page selected when the tab was opened.
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
